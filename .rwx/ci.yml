on:
  github:
    push:
      - if: ${{ event.git.branch == 'main' }}
        init:
          commit-sha: ${{ event.git.sha }}
          concurrency-pool-name: ''
          is-main-branch: true
      - if: ${{ event.git.branch != 'main' }}
        init:
          commit-sha: ${{ event.git.sha }}
          concurrency-pool-name: ${{ event.git.branch }}
          is-main-branch: false
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      concurrency-pool-name: ''
      is-main-branch: false

concurrency-pools:
  - id: rwx-research/captain:ci:${{ init.concurrency-pool-name }}
    if: ${{ init.concurrency-pool-name != '' }}
    capacity: 1
    on-overflow: cancel-running

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.0

tasks:
  - key: test
    call: ${{ run.dir }}/test.yml
    init:
      commit-sha: ${{ init.commit-sha }}
      is-cron: false

  - key: buildkite-tests
    call: ${{ run.dir }}/buildkite.yml
    init:
      commit-sha: ${{ init.commit-sha }}

  - key: backwards-compatibility-tests
    call: ${{ run.dir }}/generate-backwards-compatibility-tests.yml
    init:
      commit-sha: ${{ init.commit-sha }}

  - key: lint
    call: ${{ run.dir }}/lint.yml
    init:
      commit-sha: ${{ init.commit-sha }}

  - key: release-unstable
    after: test
    if: ${{ init.is-main-branch }}
    call: ${{ run.dir }}/release.yml
    init:
      commit-sha: ${{ init.commit-sha }}
      kind: unstable
      version: ""
